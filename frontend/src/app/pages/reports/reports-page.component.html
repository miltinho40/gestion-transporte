<div class="d-flex justify-content-between align-items-start gap-3 mb-4">
  <div>
    <h1 class="h3 mb-1">Reportes</h1>
    <p class="text-secondary mb-0">Exportación a Excel y PDF desde backend.</p>
  </div>
</div>

@if (error()) {
  <div class="alert alert-danger">{{ error() }}</div>
}

<div class="row g-3">
  <div class="col-xl-6">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white d-flex align-items-center gap-2 fw-semibold">
        <svg lucideFileSpreadsheet size="18"></svg>
        Reportes semanales
      </div>
      <div class="card-body">
        <form [formGroup]="weeklyForm" class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Año</label>
            <input class="form-control" type="number" formControlName="anio" />
          </div>
          <div class="col-md-4">
            <label class="form-label">Semana</label>
            <input class="form-control" type="number" min="1" max="53" formControlName="numero_semana" />
          </div>
          <div class="col-md-4">
            <label class="form-label">Reporte</label>
            <select class="form-select" formControlName="tipo">
              <option value="viajes-conductor">Viajes por conductor</option>
              <option value="viajes-vehiculo">Viajes por vehículo</option>
              <option value="ingresos-egresos">Ingresos y egresos</option>
            </select>
          </div>
        </form>
      </div>
      <div class="card-footer bg-white d-flex gap-2">
        <button class="btn btn-outline-success d-inline-flex align-items-center gap-2" type="button" (click)="exportWeekly('xlsx')">
          <svg lucideDownload size="17"></svg>
          Excel
        </button>
        <button class="btn btn-outline-danger d-inline-flex align-items-center gap-2" type="button" (click)="exportWeekly('pdf')">
          <svg lucideDownload size="17"></svg>
          PDF
        </button>
      </div>
    </div>
  </div>

  <div class="col-xl-6">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white d-flex align-items-center gap-2 fw-semibold">
        <svg lucideFileSpreadsheet size="18"></svg>
        Mantenimientos
      </div>
      <div class="card-body">
        <form [formGroup]="maintenanceForm" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Desde</label>
            <input class="form-control" type="date" formControlName="fecha_desde" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Hasta</label>
            <input class="form-control" type="date" formControlName="fecha_hasta" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Placa</label>
            <input class="form-control" type="search" formControlName="placa" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Palabra clave</label>
            <input class="form-control" type="search" formControlName="palabra_clave" />
          </div>
          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="por-vencer" formControlName="por_vencer" />
              <label class="form-check-label" for="por-vencer">Solo vencidos o por vencer</label>
            </div>
          </div>
        </form>
      </div>
      <div class="card-footer bg-white d-flex gap-2">
        <button class="btn btn-outline-success d-inline-flex align-items-center gap-2" type="button" (click)="exportMaintenance('xlsx')">
          <svg lucideDownload size="17"></svg>
          Excel
        </button>
        <button class="btn btn-outline-danger d-inline-flex align-items-center gap-2" type="button" (click)="exportMaintenance('pdf')">
          <svg lucideDownload size="17"></svg>
          PDF
        </button>
      </div>
    </div>
  </div>
</div>

@if (downloading()) {
  <div class="text-secondary mt-3">Generando archivo...</div>
}
